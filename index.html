<!doctype html>

<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=yes, minimum-scale=1.0, maximum-scale=2.0">
    <title>NYC AR</title>

```
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    #counter {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px 15px;
        border-radius: 20px;
        z-index: 1000;
    }
</style>
```

</head>

<body>

<a-scene
 embedded
 arjs="sourceType: webcam; debugUIEnabled: false;"
 vr-mode-ui="enabled: false">

```
<a-assets>

    <a-asset-item
        id="chestnuts"
        src="https://raw.githubusercontent.com/linaxinari/NYC/main/chestnuts.glb">
    </a-asset-item>
</a-assets>

<a-marker
    type="pattern"
    url="https://raw.githubusercontent.com/linaxinari/NYC/main/pattern-qr-code1.patt">

    <a-entity
        id="model"
        position="0 0.5 0"
        rotation="0 0 0"
        scale="0.5 0.5 0.5">
    </a-entity>

</a-marker>

<a-entity camera></a-entity>
```

</a-scene>

<script>

const models = [
    { id: 'cutecat', name: 'Cat' },
    { id: 'bunny1', name: 'Bunny' },
    { id: 'chestnuts', name: 'Chestnuts' }
];

let currentModelIndex = 0;

window.addEventListener('load', () => {

    const modelEntity = document.getElementById('model');
    const btn = document.getElementById('surprise-btn');
    const counter = document.getElementById('counter');

    console.log('modelEntity:', modelEntity);

    function loadModel(index) {

        const model = models[index];

        modelEntity.setAttribute(
            'gltf-model',
            `#${model.id}`
        );

        counter.textContent =
            `${index + 1}/${models.length}`;

        console.log('Loaded:', model.id);
    }

    btn.addEventListener('click', () => {

        currentModelIndex =
            (currentModelIndex + 1) % models.length;

        loadModel(currentModelIndex);
    });

    loadModel(0);
});

</script>

</body>
</html>
