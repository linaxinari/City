<!doctype html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=yes, minimum-scale=1.0, maximum-scale=2.0">
    <title>NYC AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #button-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        #surprise-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-weight: bold;
            transition: transform 0.2s;
        }
        #surprise-btn:active {
            transform: scale(0.95);
        }
        #counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="counter">1/3</div>
    <div id="button-container">
<button id="surprise-btn">Tap for surprise</button>
    </div>

    <a-scene
        embedded
        arjs='sourceType: webcam; debugUIEnabled: false;'
        vr-mode-ui="enabled: false"
        renderer="antialias: true; colorManagement: true;"
        id="scene">
        
        <a-assets>
            <a-asset-item id="cutecat" src="https://raw.githubusercontent.com/linaxinari/NYC/main/cutecat.glb"></a-asset-item>
            <a-asset-item id="bunny1" src="https://raw.githubusercontent.com/linaxinari/NYC/main/bunny1.glb"></a-asset-item>
            <a-asset-item id="chestnuts" src="https://raw.githubusercontent.com/linaxinari/NYC/main/chestnuts.glb"></a-asset-item>
        </a-assets>

        <!-- Pattern Marker -->
        <a-marker type='pattern' url='https://raw.githubusercontent.com/linaxinari/NYC/main/pattern-qr-code1.patt' id="marker">
            <a-entity
                id="model"
                position="0 0.5 0"
                scale="0.5 0.5 0.5"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const models = [
            { id: 'cutecat', name: 'Cat' },
            { id: 'bunny1', name: 'Bunny' },
            { id: 'chestnuts', name: 'chestnuts' }
        ];

        let currentModelIndex = 0;
        const modelEntity = document.getElementById('model');
        const btn = document.getElementById('surprise-btn');
        const counter = document.getElementById('counter');

        function loadModel(index) {
            const model = models[index];
            modelEntity.setAttribute('gltf-model', `#${model.id}`);
            counter.textContent = `${index + 1}/${models.length}`;
        }

        btn.addEventListener('click', function() {
            currentModelIndex = (currentModelIndex + 1) % models.length;
            loadModel(currentModelIndex);
        });

        // Load first model on page load
        loadModel(0);
    </script>
</body>
</html>
