<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=yes, minimum-scale=1.0, maximum-scale=2.0">
    <title>NYC AR</title>

    <!-- Corrected: Removed markdown backticks and kept scripts inside <head> -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false">

        <a-assets>
            <a-asset-item
                id="chestnuts"
                src="https://raw.githubusercontent.com/linaxinari/NYC/main/chestnuts.glb">
            </a-asset-item>
        </a-assets>

        <a-marker
            type="pattern"
            url="https://raw.githubusercontent.com/linaxinari/NYC/main/pattern-starmoonqr.patt">

            <a-entity
                id="model"
                position="0 0.5 0"
                rotation="0 0 0"
                scale="0.5 0.5 0.5"
                gltf-model="#chestnuts">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

<script>
    const models = [
        { id: 'chestnuts', name: 'Chestnuts' }
    ];

    window.addEventListener('load', () => {
        const modelEntity = document.getElementById('model');

        function loadModel(index) {
            const model = models[index];
            if (modelEntity) {
                modelEntity.setAttribute('gltf-model', `#${model.id}`);
            }
        }
        loadModel(0); // Loads the first model automatically
    });
</script>
</body>
</html>
