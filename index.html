<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=yes, minimum-scale=1.0, maximum-scale=2.0">
    <title>NYC AR</title>

    <!-- Corrected: Removed markdown backticks and kept scripts inside <head> -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            z-index: 1000;
        }

        #btn {
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1000;
            padding: 10px 20px;
            background: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Added missing counter and button elements -->
    <div id="counter">1/1</div>
    <button id="btn">Next Model</button>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false">

        <a-assets>
            <a-asset-item
                id="chestnuts"
                src="https://raw.githubusercontent.com/linaxinari/NYC/main/chestnuts.glb">
            </a-asset-item>
        </a-assets>

        <a-marker
            type="pattern"
            url="https://raw.githubusercontent.com/linaxinari/NYC/main/pattern-starmoonqr.patt">

            <a-entity
                id="model"
                position="0 0.5 0"
                rotation="0 0 0"
                scale="0.5 0.5 0.5"
                gltf-model="#chestnuts">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const models = [
            { id: 'chestnuts', name: 'Chestnuts' }
        ];

        let currentModelIndex = 0;

        // Ensure everything is loaded before running script
        window.addEventListener('load', () => {
            const modelEntity = document.getElementById('model');
            const btn = document.getElementById('btn');
            const counter = document.getElementById('counter');

            function loadModel(index) {
                const model = models[index];
                if (modelEntity) {
                    modelEntity.setAttribute('gltf-model', `#${model.id}`);
                }
                if (counter) {
                    counter.textContent = `${index + 1}/${models.length}`;
                }
                console.log('Loaded:', model.id);
            }

            if (btn) {
                btn.addEventListener('click', () => {
                    currentModelIndex = (currentModelIndex + 1) % models.length;
                    loadModel(currentModelIndex);
                });
            }

            loadModel(0);
        });
    </script>
</body>
</html>
